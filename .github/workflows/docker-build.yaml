name: Byg docker image

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build Docker image
              run: docker build -t ghcr.io/${{ github.repository_owner }}/hello-docker:latest ./HelloWorldDocker

            - name: Run Docker image
              run: docker run ghcr.io/${{ github.repository_owner }}/hello-docker:latest

            - name: Push Docker image
              run: docker push ghcr.io/${{ github.repository_owner }}/hello-docker:latest
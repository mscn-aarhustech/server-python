name: Build Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/hello-python:latest ./HelloWorldDocker
      
      - name: Run Docker image
        run: docker run ghcr.io/${{ github.repository_owner }}/hello-python:latest

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/hello-python:latest